server:
  port: "${REPOR_PORT}"
spring:
  application:
    name: "reportes"
  devtools:
    add-properties: false
  h2:
    console:
      enabled: true
      path: "/h2"
  profiles:
    include: dev
entrypoint:
  sqs:
    region: "${AWS_REGION}"
    queueUrl: "${QUEUE_SOLICITUDES_APROBADAS}"
    waitTimeSeconds: 10
    maxNumberOfMessages: 5
    visibilityTimeoutSeconds: 10
    numberOfThreads: 1
management:
  endpoints:
    web:
      exposure:
        include: "health"
  endpoint:
    health:
      probes:
        enabled: true
cors:
  allowed-origins: "http://localhost:4200,http://localhost:8080"
